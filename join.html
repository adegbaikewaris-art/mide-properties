<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Path Join Example</title>
        <link rel="stylesheet" href="style.css">
</html>
<body style="overflow-y: hidden;">
    <div class="form">
            <form class="formfill">
                <input type="text" placeholder="First Name" required class="fname">
                <input type="name" placeholder="last name" required class="lname">
                <input type="email" placeholder="Email address" required class="email">
                <select name="countrycode" placeholder="Country Code" class="fname hi">
                    <option value="+1">USA (+1)</option>
                    <option value="+234">Nigeria (+234)</option>
                    <option value="+44">United Kingdom (+44)</option>
                    <option value="+91">India (+91)</option>
                    <option value="+86">China (+86)</option>
                    <option value="+33">France (+33)</option>
                    <option value="+49">Germany (+49)</option>
                    <option value="+39">Italy (+39)</option>
                    <option value="+34">Spain (+34)</option>
                    <option value="+7">Russia (+7)</option>
                    <option value="+81">Japan (+81)</option>
                    <option value="+82">South Korea (+82)</option>
                    <option value="+27">South Africa (+27)</option>
                    <option value="+20">Egypt (+20)</option>
                    <option value="+971">United Arab Emirates (+971)</option>
                    <option value="+90">Turkey (+90)</option>
                    <option value="+31">Netherlands (+31)</option>
                    <option value="+61">Australia (+61)</option>
                    <option value="+64">New Zealand (+64)</option>
                    <option value="+55">Brazil (+55)</option>
                </select>
                <input type="text" placeholder="Phone number" required class="lname">
                <div class="radio">
                    <p>
                        Select house preference
                    </p>
                    <div class="radioss">
                    <div>
                        <div>
                        <input type="radio" id="0ne" name="optionppp" value="one">
                        <label for="one">2 Bedroom flat</label>
                    </div>
                    <div>   
                        <input type="radio" id="two" name="optiopn" value="two">
                        <label for="two">3 bedroom terrace (flat upstairs)</label>
                    </div>
                    <div>    
                        <input type="radio" id="three" name="optiokn" value="three">
                        <label for="three">2 bedroom bungalow<label>
                    </div>
                    <div>    
                        <input type="radio" id="four" name="optionj" value="four">
                        <label for="four">3 bedroom terrace (standard)</label>
                    </div>
                    <div>
                        <input type="radio" id="five" name="optionh" value="fivee">
                        <label for="five">3 bedroom duplex +BQ (asake cottage)</label>
                    </div>
                    <div>
                        <input type="radio" id="six" name="optiond" value="six">
                        <label for="six">3 bedroom duplex +BQ (granville cinema)</label>
                    </div>
                    </div>
                    <div>
                        
                    <div>
                        <input type="radio" id="seven" name="options" value="seven">
                        <label for="seven">3 bedroom flat</label>
                    </div>
                    <div>    
                        <input type="radio" id="eight" name="optiong" value="eight">
                        <label for="eight">4 bedroom terrace (flat upstairs)</label>
                    </div>
                    <div>
                        <input type="radio" id="nine" name="optiona" value="nine">
                        <label for="nine">3 bedroom bungalow</label>
                    </div>
                    <div>    
                        <input type="radio" id="ten" name="option4" value="ten">
                        <label for="ten">4 bedroom terrace (flat cottage)</label>
                    </div>
                    <div>
                        <input type="radio" id="eleven" name="optionf" value="eleven">
                        <label for="eleven">4 bedroom duplex +BQ (asake cottage)</label>
                    </div>
                    <div>    
                        <input type="radio" id="twelve" name="options" value="twelve">
                        <label for="twelve">4 bedroom duplex +BQ (granville cinema)</label>
                    </div>
                    </div>
                    </div>
                </div>
                <p>Preferred Date and Time for contact</p>
                <input type="datetime-local" class="email">
                <p style="font-size: 14px; color: rgb(99, 98, 98); margin: 0;">e.g., 08-10-2005 02:30 PM</p>
                <button class="cta-btn lastbtn">
                    <a href="./create.html" class="cta-button" target="iframeA">Secure your dream home</a>
                </button>
            </form>
        </div>
</body>
